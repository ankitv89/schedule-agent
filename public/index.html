<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Agent AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Manage your tasks and calendar with an intelligent MCP-powered Agent.">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="bot-avatar">
        🤖
      </div>
      <div class="header-info">
        <h1>Schedule Agent</h1>
        <p>Online & Ready to Help</p>
      </div>
    </header>
    
    <div id="chat-box" class="chat-box">
      <div class="message bot">
        <div class="message-bubble">Hello! I can help you manage your calendar, tasks, and notes. What would you like to do?</div>
      </div>
    </div>
    
    <form id="chat-form" class="chat-form">
      <input type="text" id="chat-input" placeholder="Type your message..." required autocomplete="off">
      <button type="submit" id="send-button">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
      </button>
    </form>
  </div>
  <script src="app.js"></script>
</body>
</html>
